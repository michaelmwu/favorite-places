name: Playwright

on:
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.*"
      - "package.json"
      - "bun.lock"
      - "playwright.config.*"
      - "tests/e2e/**"
      - "site.example/**"
      - ".github/workflows/playwright.yml"
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "astro.config.*"
      - "package.json"
      - "bun.lock"
      - "playwright.config.*"
      - "tests/e2e/**"
      - "site.example/**"
      - ".github/workflows/playwright.yml"

permissions:
  contents: read

jobs:
  test-e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.11.6"
          enable-cache: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e
