name: CI

# Keep hosted CI validation-only.
# Do not add Google Maps scraping or enrichment refresh jobs here; those belong in
# the dedicated self-hosted data-refresh workflow.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    runs-on: ubuntu-latest

    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      python_pipeline: ${{ steps.filter.outputs.python_pipeline }}
      content_or_data: ${{ steps.filter.outputs.content_or_data }}
      workflow: ${{ steps.filter.outputs.workflow }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            frontend:
              - "src/**"
              - "public/**"
              - "astro.config.*"
              - "package.json"
              - "bun.lock"
              - "tsconfig.json"
              - "tests/frontend/**"
            python_pipeline:
              - "scripts/**"
              - "pyproject.toml"
              - "uv.lock"
              - "vendor/google-saved-lists/**"
              - "tests/python/**"
            content_or_data:
              - "data/raw/**"
              - "data/cache/**"
              - "site/config.ts"
              - "site/theme.css"
              - "site/content/templates/**"
              - "site/data/imports/**"
              - "site/data/raw/**"
              - "site/data/cache/**"
              - "site/list_sources.json"
              - "site/overrides/**"
              - "site/public/**"
              - "site.example/**"
              - "src/data/**"
              - "scripts/config/**"
            workflow:
              - ".github/workflows/**"

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install frontend dependencies
        run: bun ci

      - name: Run frontend tests
        run: bun run test:frontend

  test-python:
    needs: changes
    if: needs.changes.outputs.python_pipeline == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Run Python tests
        run: uv run python3 -m unittest discover -s tests/python -p 'test_*.py'

  verify-site:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.python_pipeline == 'true' || needs.changes.outputs.content_or_data == 'true' || needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install frontend dependencies
        run: bun ci

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build generated site data
        run: bun run build:data

      - name: Type-check Astro project
        run: bun run check

      - name: Build Astro site
        run: bun run build
