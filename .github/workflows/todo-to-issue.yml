name: Convert TODOs to Issues

on:
  pull_request_target:
    branches:
      - main
    types:
      - closed

concurrency:
  group: todo-to-issue
  cancel-in-progress: false

jobs:
  todo-to-issue:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_AUTOMATION_TOKEN != '' && secrets.GH_AUTOMATION_TOKEN || github.token }}

      - name: Convert TODOs to issues
        uses: alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657 # v5
        with:
          IDENTIFIERS: '[{"name": "BUG", "labels": []}, {"name": "FIXME", "labels": []}, {"name": "TODO", "labels": []}]'
          INSERT_ISSUE_URLS: "true"

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push inserted issue links
        shell: bash
        run: |
          set -euo pipefail

          git add -A
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Automatically added GitHub issue links to TODOs"

          max_attempts=3
          for attempt in $(seq 1 "${max_attempts}"); do
            if git pull --rebase origin main && git push origin main; then
              exit 0
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Failed to rebase and push TODO link updates after ${max_attempts} attempts."
              exit 1
            fi

            echo "Push attempt ${attempt} failed. Retrying after backoff."
            sleep $((attempt * 5))
          done
