name: Convert TODOs to Issues

on:
  push:
    branches:
      - main

concurrency:
  group: todo-to-issue
  cancel-in-progress: false

jobs:
  todo-to-issue:
    # Must match AUTO_COMMIT_MSG env var below (env context unavailable in job-level if)
    if: github.event.head_commit.message != 'Automatically added GitHub issue links to TODOs'
    runs-on: ubuntu-latest

    env:
      AUTO_COMMIT_MSG: Automatically added GitHub issue links to TODOs

    permissions:
      contents: write
      issues: write

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          token: ${{ github.token }}
          persist-credentials: false

      - name: Convert TODOs to issues
        uses: alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657 # v5
        with:
          IDENTIFIERS: '[{"name": "BUG", "labels": []}, {"name": "FIXME", "labels": []}, {"name": "TODO", "labels": []}]'
          INSERT_ISSUE_URLS: "true"

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit and push inserted issue links
        shell: bash
        env:
          PUSH_TOKEN: ${{ secrets.GH_AUTOMATION_TOKEN != '' && secrets.GH_AUTOMATION_TOKEN || github.token }}
        run: |
          set -euo pipefail

          git remote set-url origin "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "${AUTO_COMMIT_MSG}"

          max_attempts=3
          for attempt in $(seq 1 "${max_attempts}"); do
            if ! git pull --rebase origin main; then
              if [[ -d .git/rebase-merge || -d .git/rebase-apply ]]; then
                git rebase --abort || true
              fi
              echo "Failed to rebase TODO link updates onto origin/main."
              exit 1
            fi

            if git push origin HEAD:main; then
              exit 0
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Failed to push TODO link updates after ${max_attempts} attempts."
              exit 1
            fi

            echo "Push attempt ${attempt} failed after a successful rebase. Retrying after backoff."
            sleep $((attempt * 5))
          done
