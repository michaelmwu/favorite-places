name: Convert TODOs to Issues

on:
  push:
    branches:
      - main

concurrency:
  group: todo-to-issue
  cancel-in-progress: false

jobs:
  todo-to-issue:
    runs-on: ubuntu-latest
    env:
      TODO_BRANCH: automation/todo-to-issue

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_AUTOMATION_TOKEN != '' && secrets.GH_AUTOMATION_TOKEN || github.token }}

      - name: Convert TODOs to issues
        uses: alstr/todo-to-issue-action@64aca8fda7023259aada83ba44ad988c4c443657 # v5
        with:
          IDENTIFIERS: '[{"name": "BUG", "labels": []}, {"name": "FIXME", "labels": []}, {"name": "TODO", "labels": []}]'
          INSERT_ISSUE_URLS: "true"

      - name: Configure Git identity
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit inserted issue links to automation branch
        id: commit
        shell: bash
        run: |
          set -euo pipefail

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          git switch -C "${TODO_BRANCH}"
          git commit -m "Automatically added GitHub issue links to TODOs"
          git push --force-with-lease origin "${TODO_BRANCH}"
          echo "changed=true" >> "${GITHUB_OUTPUT}"

      - name: Create or update pull request
        if: steps.commit.outputs.changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          TODO_BRANCH: ${{ env.TODO_BRANCH }}
        with:
          github-token: ${{ secrets.GH_AUTOMATION_TOKEN != '' && secrets.GH_AUTOMATION_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = `${owner}:${process.env.TODO_BRANCH}`;
            const title = "Automatically added GitHub issue links to TODOs";
            const body = [
              "Automated update that inserts GitHub issue URLs for TODO-style comments identified on `main`.",
              "",
              "- Generated by the `todo-to-issue` workflow",
              `- Source push: https://github.com/${owner}/${repo}/commit/${context.sha}`,
              `- Automation branch: \`${process.env.TODO_BRANCH}\``,
            ].join("\n");

            const { data: pulls } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head,
              base: "main",
            });

            if (pulls.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: pulls[0].number,
                title,
                body,
              });
              return;
            }

            await github.rest.pulls.create({
              owner,
              repo,
              head: process.env.TODO_BRANCH,
              base: "main",
              title,
              body,
            });
